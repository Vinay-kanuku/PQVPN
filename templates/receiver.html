<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnika Receiver</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 40px;
        }
        h1 { color: #58a6ff; margin-bottom: 10px; font-weight: 600; }
        .subtitle { color: #8b949e; margin-bottom: 30px; }
        
        .badge {
            background: #238636;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        
        .file-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .file-card:hover {
            transform: translateY(-4px);
            background: #1c2128;
            border-color: #58a6ff;
        }
        
        .file-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }
        
        .file-name {
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 8px;
            color: #e6edf3;
        }
        
        .file-meta {
            color: #8b949e;
            font-size: 12px;
        }
        
        .empty {
            color: #8b949e;
            text-align: center;
            padding: 60px;
            grid-column: 1 / -1;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .device-info {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px 16px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #8b949e;
            display: inline-block;
        }
        .device-info span { color: #58a6ff; }
        .security-info {
            background: #161b22;
            border: 1px solid #238636;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #8b949e;
        }
        .security-info strong { color: #238636; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📥 Arnika Receiver</h1>
        <div class="badge" id="count">0 files received</div>
    </div>
    
    <div class="device-info">Device: <span id="deviceName">Loading...</span></div>
    <p class="subtitle">Files received via quantum-secure VPN</p>
    
    <div class="security-info">
        <strong>🔐 Security:</strong> Post-Quantum Tunnel Active | WireGuard + Arnika (QKD PSK) | Kyber512 Key Exchange
    </div>
    
    <div class="files-grid" id="files">
        <div class="empty">No files received yet</div>
    </div>

    <script>
        async function loadStatus() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                document.getElementById('deviceName').textContent = d.device_name || 'Unknown';
            } catch (e) { console.error(e); }
        }
        
        function getIcon(filename) {
            const ext = '.' + filename.split('.').pop().toLowerCase();
            const icons = {
                '.png': '🖼️', '.jpg': '🖼️', '.jpeg': '🖼️', '.gif': '🖼️', '.webp': '🖼️',
                '.pdf': '📕', '.txt': '📄', '.py': '🐍', '.js': '📜', '.json': '📋',
                '.html': '🌐', '.css': '🎨', '.md': '📝', '.sh': '⚡', '.zip': '📦'
            };
            return icons[ext] || '📄';
        }

        function getViewableExt(filename) {
            const ext = '.' + filename.split('.').pop().toLowerCase();
            return ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.txt', '.md', '.json', '.html', '.css', '.js', '.py'].includes(ext);
        }
        
        async function loadFiles() {
            try {
                const r = await fetch('/api/files');
                const f = await r.json();
                
                document.getElementById('count').textContent = 
                    f.length + ' file' + (f.length !== 1 ? 's' : '') + ' received';
                
                const grid = document.getElementById('files');
                if (f.length > 0) {
                    grid.innerHTML = f.map(file => {
                        const viewable = getViewableExt(file.name);
                        const url = viewable ? `/view/${encodeURIComponent(file.name)}` : `/download/${encodeURIComponent(file.name)}`;
                        const target = viewable ? '' : 'target="_blank"';
                        return `<a href="${url}" ${target} class="file-card">
                            <span class="file-icon">${getIcon(file.name)}</span>
                            <div class="file-name">${file.name}</div>
                            <div class="file-meta">${(file.size / 1024).toFixed(1)} KB • ${file.time}</div>
                        </a>`;
                    }).join('');
                } else {
                    grid.innerHTML = '<div class="empty">No files received yet</div>';
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        setInterval(() => { loadFiles(); loadStatus(); }, 2000);
        loadStatus();
        loadFiles();
    </script>
</body>
</html>
