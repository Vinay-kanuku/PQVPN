<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnika Sender - Post-Quantum Secure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        h1 { color: #58a6ff; margin-bottom: 5px; font-weight: 600; }
        .subtitle { color: #8b949e; margin-bottom: 20px; font-size: 14px; }
        
        .security-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            width: 400px;
        }
        .security-panel h3 {
            color: #58a6ff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .security-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
        }
        .security-row:last-child { border-bottom: none; }
        .security-label { color: #8b949e; }
        .security-value { color: #e6edf3; font-family: monospace; font-size: 12px; }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .status.secure { background: #238636; color: #fff; }
        .status.insecure { background: #da3633; color: #fff; }
        .status.unknown { background: #6e7681; color: #fff; }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .upload-zone {
            width: 400px;
            height: 150px;
            border: 2px dashed #30363d;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #161b22;
        }
        .upload-zone.secure { border-color: #238636; }
        .upload-zone.blocked { border-color: #da3633; opacity: 0.5; cursor: not-allowed; }
        .upload-zone:hover:not(.blocked) { border-color: #58a6ff; background: #1c2128; }
        .upload-zone p { color: #8b949e; font-size: 14px; }
        .upload-zone input { display: none; }
        
        .btn {
            background: #238636;
            color: #fff;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn:disabled { background: #6e7681; cursor: not-allowed; }
        .btn:hover:not(:disabled) { background: #2ea043; }
        
        .file-list { width: 400px; margin-top: 20px; }
        .file-item {
            background: #161b22;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #30363d;
        }
        .file-info { font-size: 14px; }
        .file-meta { color: #8b949e; font-size: 12px; margin-top: 4px; }
        .file-status { font-size: 12px; color: #238636; }
        .empty { color: #8b949e; text-align: center; padding: 20px; font-size: 14px; }

        .lock-icon { font-size: 24px; }
    </style>
</head>
<body>
    <h1>📤 Arnika Sender</h1>
    <p class="subtitle">Post-Quantum Secure File Transfer</p>
    
    <div id="securityPanel" class="security-panel" style="display:none">
        <h3>🔐 Security Stack</h3>
        <div class="security-row">
            <span class="security-label">Key Exchange</span>
            <span class="security-value" id="alg">-</span>
        </div>
        <div class="security-row">
            <span class="security-label">Tunnel</span>
            <span class="security-value" id="tunnel">-</span>
        </div>
        <div class="security-row">
            <span class="security-label">PSK</span>
            <span class="security-value" id="pskKey">-</span>
        </div>
        <div class="security-row">
            <span class="security-label">Protection</span>
            <span class="security-value" id="protect">-</span>
        </div>
    </div>
    
    <div id="status" class="status unknown">
        <span class="dot"></span>
        <span>Checking...</span>
    </div>
    
    <div id="uploadZone" class="upload-zone" onclick="if(!this.classList.contains('blocked'))document.getElementById('file').click()">
        <div class="lock-icon" id="uploadIcon">📁</div>
        <p id="uploadText">Click to upload file</p>
        <input type="file" id="file" onchange="uploadFile(this.files[0])">
    </div>
    
    <button class="btn" id="uploadBtn" onclick="document.getElementById('file').click()">Select File</button>
    
    <div class="file-list" id="files">
        <div class="empty">No files uploaded</div>
    </div>

    <script>
        let isSecure = false;
        
        async function checkStatus() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                isSecure = d.secure === true;
                
                const s = document.getElementById('status');
                const zone = document.getElementById('uploadZone');
                const icon = document.getElementById('uploadIcon');
                const text = document.getElementById('uploadText');
                const btn = document.getElementById('uploadBtn');
                const panel = document.getElementById('securityPanel');
                
                if (d.secure === true) {
                    s.className = 'status secure';
                    s.innerHTML = '<span class="dot"></span><span>Quantum Secure</span>';
                    zone.className = 'upload-zone secure';
                    icon.textContent = '🔒';
                    text.textContent = 'Secure - Click to upload';
                    btn.disabled = false;
                    panel.style.display = 'block';
                    document.getElementById('alg').textContent = d.security_info.algorithm;
                    document.getElementById('tunnel').textContent = d.security_info.tunnel;
                    document.getElementById('pskKey').textContent = d.psk || 'Active';
                    document.getElementById('protect').textContent = d.security_info.protection;
                } else if (d.secure === false) {
                    s.className = 'status insecure';
                    s.innerHTML = '<span class="dot"></span><span>Not Secure</span>';
                    zone.className = 'upload-zone blocked';
                    icon.textContent = '🔓';
                    text.textContent = 'Blocked - VPN not secure';
                    btn.disabled = true;
                    panel.style.display = 'none';
                } else {
                    s.className = 'status unknown';
                    s.innerHTML = '<span class="dot"></span><span>Unknown</span>';
                    zone.className = 'upload-zone';
                    icon.textContent = '📁';
                    text.textContent = 'Checking security...';
                    btn.disabled = true;
                    panel.style.display = 'none';
                }
                
                const list = document.getElementById('files');
                if (d.files && d.files.length > 0) {
                    list.innerHTML = d.files.map(f => `
                        <div class="file-item">
                            <div class="file-info">
                                <div>${f.name}</div>
                                <div class="file-meta">${(f.size / 1024).toFixed(1)} KB • ${f.time}</div>
                            </div>
                            <span class="file-status">✓ Sent via PSK</span>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div class="empty">No files uploaded</div>';
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        async function uploadFile(file) {
            if (!file || !isSecure) return;
            const fd = new FormData();
            fd.append('file', file);
            try {
                const r = await fetch('/upload', { method: 'POST', body: fd });
                const d = await r.json();
                if (d.success) {
                    alert('✅ File sent via Quantum-Secure Tunnel!');
                } else {
                    alert('❌ ' + d.error);
                }
            } catch (e) {
                alert('❌ ' + e);
            }
            checkStatus();
        }
        
        setInterval(checkStatus, 3000);
        checkStatus();
    </script>
</body>
</html>
